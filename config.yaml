battery:
  on_ac: performance
  on_battery: balanced
  low_battery: quiet
  low_battery_percent: 25

temperature:
  quiet_max: 55
  balanced_max: 75
  performance_above: 75

daemon:
  interval_seconds: 5
  notify: true
  profile_switch_journal: true
  performance_apps:
    - steam
    - steamwebhelper
    - prismlauncher
    - blender
    - lutris
    - heroic
    - heroicgameslauncher
    - gamescope
    - mangohud
    - wine
    - proton
    - umu
    - gamemoderun
